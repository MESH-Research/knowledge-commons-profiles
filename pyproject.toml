[dependency-groups]
production = [
    "gunicorn==26.0.0",
    "psycopg[c]==3.3.3",
    "Collectfasta==3.3.3",
    "sentry-sdk==2.63.0",
    "django-storages[s3]==1.14.6",
    "django-anymail[amazon-ses]==15.0",
    # IDMS async broker service (config.settings.idms): ASGI server + a bounded
    # psycopg connection pool so the broker cannot exhaust Postgres under load.
    "uvicorn[standard]==0.51.0",
    "psycopg-pool==3.2.6",
]
dev = [
    {include-group = "production"},
]
local = [
    {include-group = "production"},
    "Werkzeug[watchdog]==3.1.6",
    "ipdb==0.13.13",
    "psycopg[c]==3.3.3",
    # Testing
    "mypy==1.20.2",
    "django-stubs[compatible-mypy]==6.0.3",
    "pytest==9.1.0",
    "pytest-sugar==1.1.1",
    # Documentation
    "sphinx==9.1.0",
    "sphinx-autobuild==2025.8.25",
    # Code quality
    "ruff==0.15.21",
    "coverage==7.14.2",
    "djlint==1.40.5",
    "pre-commit==4.6.0",
    # Django dev tools
    "factory-boy==3.3.3",
    "django-debug-toolbar==6.3.0",
    "django-extensions==4.1",
    "django-coverage-plugin==3.2.2",
    "pytest-django==4.12.0",
    "toml==0.10.2",
    "sphinx-rtd-theme==3.1.0",
    "django-sslserver",
]
loadtest = [
    # Optional: only needed when running with LOADTEST_PROMETHEUS=1 to expose
    # /metrics for Prometheus scraping during a load run. Install with:
    #   uv sync --group loadtest
    # The 2.4.1 stable release pins django<6.0; this project is on django 6,
    # so we use the latest published dev release that allows it.
    "django-prometheus==2.6.0.dev1",
]

[tool.commitizen]
version = "4.43.1"
version_files = [
    "knowledge_commons_profiles/__version__.py",
    "pyproject.toml:version"
]
update_changelog_on_bump = true

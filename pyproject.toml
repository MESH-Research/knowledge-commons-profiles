    "python-slugify==8.0.4",
    "Pillow==12.1.1",
    "argon2-cffi==25.1.0",
    "redis==7.4.0",
    "hiredis==3.3.1",
    # Django
    "django==6.0.7",
    "django-environ==0.14.0",
    "django-model-utils==5.0.0",
    "django-crispy-forms==2.6",
    "crispy-bootstrap5==2026.3",
    "django-redis==7.0.0",
    # App
    "djangorestframework==3.17.1",
    "django-tinymce==5.0.0",
    "django-select2==8.4.8",
    "django-bleach==3.1.0",
    "phpserialize==1.3",
    "asyncstdlib==3.14.0",
    "lxml==6.1.1",
    "aiohttp==3.14.0",
    "mysqlclient==2.2.8",
    "black[d]==26.5.1",
    "pylint==4.0.6",
    # Management commands
    "rich==14.3.3",
    "sqloxide==0.61.1",
    "smart-open==7.6.0",
    "pydantic==2.13.4",
    "httpx==0.28.1",
    "tenacity==9.1.4",
    "pandas==3.0.3",
    "altair==6.1.0",
    "django-basicauth==0.5.3",
    "Authlib==1.6.9",
    "requests==2.33.1",
    "nameparser==1.1.3",
    "tldextract==5.3.1",
    "drf-yasg==1.21.15",
    "python-json-logger==4.1.0",
    "validators==0.35.0",
    "urllib3==2.7.0",
    "sparkpost==1.3.10",
    "pyopenssl==26.1.0",
    "cryptography==46.0.7",
    "PyJWT==2.12.1"

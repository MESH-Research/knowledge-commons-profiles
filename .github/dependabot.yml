# Config for Dependabot updates. See Documentation here:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Update GitHub actions in workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'dev'
    # Every weekday
    schedule:
      interval: 'daily'

  # Enable version updates for Docker
  - package-ecosystem: 'docker'
    # Look for a `Dockerfile` in the `compose/local/django` directory
    directories:
      - 'compose/local/django/'
      - 'compose/local/docs/'
      - 'compose/production/django/'
    target-branch: 'dev'
    # Every weekday
    schedule:
      interval: 'daily'
    # Ignore minor version updates (3.10 -> 3.11) but update patch versions
    ignore:
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
          - 'version-update:semver-minor'


  - package-ecosystem: 'docker'
    # Look for a `Dockerfile` in the `compose/local/node` directory
    directories:
      - 'compose/local/node/'
      - 'compose/production/aws/'
      - 'compose/github/postgres/'
      - 'compose/production/traefik/'
    target-branch: 'dev'
    # Every weekday
    schedule:
      interval: 'daily'

  # Enable version updates for Python/uv
  - package-ecosystem: 'uv'
    directory: '/'
    target-branch: 'dev'
    # Every weekday
    schedule:
      interval: 'daily'
    # sqloxide 0.61+ has breaking serde/JSON layout changes that would
    # require rewriting import_from_sql's parse-tree walker. Pin to 0.1.56.
    ignore:
      - dependency-name: 'sqloxide'

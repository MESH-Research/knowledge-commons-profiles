version: 1
disable_existing_loggers: False

formatters:
  json_formatter:
    (): log_config.error_formatter.StructuredExceptionJsonFormatter
    format: "%(asctime)s %(name)s %(levelname)s %(message)s"
    rename_fields:
      levelname: level
      asctime: time

filters:
  add_context:  # register the filter
    (): log_config.log_context.ContextFilter
  require_debug_false:
    (): django.utils.log.RequireDebugFalse
  suppress_health_check:
    (): log_config.health_check_filter.HealthCheckFilter

handlers:
  console:
    class: logging.StreamHandler
    formatter: json_formatter
    level: DEBUG
    filters: [add_context]
  mail_admins:
    class: django.utils.log.AdminEmailHandler
    level: ERROR
    filters: [require_debug_false, suppress_health_check]

loggers:
  django.request:
    handlers: [mail_admins]
    level: ERROR
    propagate: True
  knowledge_commons_profiles:
    handlers: [console]
    level: DEBUG
    propagate: False

root:
  handlers: [console]
  level: INFO

version: 1
disable_existing_loggers: False

formatters:
  json_formatter:
    (): log_config.error_formatter.StructuredExceptionJsonFormatter
    format: "%(asctime)s %(name)s %(levelname)s %(message)s"
    rename_fields:
      levelname: level
      asctime: time

filters:
  add_context:  # register the filter
    (): log_config.log_context.ContextFilter

handlers:
  console:
    class: logging.StreamHandler
    formatter: json_formatter
    level: DEBUG
    filters: [add_context]

loggers:
  # Override Django's DEFAULT_LOGGING, which wires mail_admins to
  # django.request and floods the admin inbox during dependency
  # outages (issue #561). Sentry is the sole error channel.
  django.request:
    handlers: [console]
    level: ERROR
    propagate: False
  knowledge_commons_profiles:
    handlers: [console]
    level: DEBUG
    propagate: False

root:
  handlers: [console]
  level: INFO

log:
  level: INFO

entryPoints:
  web:
    # http
    address: ':80'

  ping:
    address: ":8082"

ping:
  entryPoint: "ping"

http:
  routers:
    broker-router:
      # Path-route /broker/* to the standalone async IDMS service, on the same
      # host(s) as the profiles app so the login session cookie still reaches
      # it. The host rule replicates web-router's; the explicit high priority
      # beats web-router's length-derived default so /broker/* wins here while
      # every other path falls through to django.
      rule: '(Host(`profile.hcommons.org`) || Host(`www.profile.hcommons.org`) || Host(`profile.hcommons-test.org`) || Host(`www.profile.hcommons-test.org`)) && PathPrefix(`/broker/`)'
      priority: 1000
      entryPoints:
        - web
      service: idms
    web-router:
      rule: 'Host(`profile.hcommons.org`) || Host(`www.profile.hcommons.org`) || Host(`profile.hcommons-test.org`) || Host(`www.profile.hcommons-test.org`)'
      entryPoints:
        - web
      middlewares:
        - csrf
      service: django
    localhost-router:
      rule: 'Host(`localhost`)'
      entryPoints:
        - web
      middlewares:
        - csrf
      service: django
    health-check-router:
      rule: 'Path(`/health/`)'
      priority: 100
      entryPoints:
        - web
      service: django

  middlewares:
    csrf:
      # https://doc.traefik.io/traefik/master/middlewares/http/headers/#hostsproxyheaders
      # https://docs.djangoproject.com/en/dev/ref/csrf/#ajax
      headers:
        hostsProxyHeaders: ['X-CSRFToken']

  services:
    django:
      loadBalancer:
        servers:
          - url: http://django:5000
    idms:
      loadBalancer:
        servers:
          - url: http://idms:8000

providers:
  # https://doc.traefik.io/traefik/master/providers/file/
  file:
    filename: /etc/traefik/traefik.yml
    watch: true

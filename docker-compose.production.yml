volumes:
  production_traefik: {}

services:
  django:
    platform: linux/arm64
    build:
      platforms:
        - linux/arm64
      context: .
      dockerfile: ./compose/production/django/Dockerfile
      args:
        ECR_REGISTRY: ${ECR_REGISTRY:-registry}
      tags:
        - ${ECR_REGISTRY:-registry}/${ECR_REPOSITORY:-django}:${IMAGE_TAG:-latest}
        - ${ECR_REGISTRY:-registry}/${ECR_REPOSITORY:-django}:latest
        - knowledge_commons_profiles_production_django:${IMAGE_TAG:-latest}
        - knowledge_commons_profiles_production_django:latest
    image: knowledge_commons_profiles_production_django
    extra_hosts:
        - "host.docker.internal:host-gateway"
    env_file:
      - ./.envs/.production/.django
    command: /start

  idms:
    platform: linux/arm64
    build:
      platforms:
        - linux/arm64
      context: .
      dockerfile: ./compose/production/idms/Dockerfile
      args:
        ECR_REGISTRY: ${ECR_REGISTRY:-registry}
      tags:
        - ${ECR_REGISTRY:-registry}/${ECR_REPOSITORY_IDMS:-idms}:${IMAGE_TAG:-latest}
        - ${ECR_REGISTRY:-registry}/${ECR_REPOSITORY_IDMS:-idms}:latest
        - knowledge_commons_profiles_production_idms:${IMAGE_TAG:-latest}
        - knowledge_commons_profiles_production_idms:latest
    image: knowledge_commons_profiles_production_idms
    extra_hosts:
        - "host.docker.internal:host-gateway"
    # Shares the django env file: same SECRET_KEY, DATABASE_URL, REDIS_SERVER
    # and STATIC_API_BEARER, so it reads the same sessions and broker nonces.
    # The start script forces DJANGO_SETTINGS_MODULE=config.settings.idms.
    env_file:
      - ./.envs/.production/.django
    command: /start

  traefik:
    platform: linux/arm64
    build:
      platforms:
        - linux/arm64
      context: .
      dockerfile: ./compose/production/traefik/Dockerfile
      tags:
        - ${ECR_REGISTRY:-registry}/${ECR_REPOSITORY_TRAEFIK:-traefik}:${IMAGE_TAG:-latest}
        - ${ECR_REGISTRY:-registry}/${ECR_REPOSITORY_TRAEFIK:-traefik}:latest
        - knowledge_commons_profiles_production_traefik:${IMAGE_TAG:-latest}
        - knowledge_commons_profiles_production_traefik:latest
    image: knowledge_commons_profiles_production_traefik
    depends_on:
      - django
      - idms
    volumes:
      - production_traefik:/etc/traefik/acme
    ports:
      - '0.0.0.0:80:80'

  monitor:
    platform: linux/arm64
    build:
      platforms:
        - linux/arm64
      context: .
      dockerfile: ./compose/production/monitor/Dockerfile
      tags:
        - ${ECR_REGISTRY:-registry}/${ECR_REPOSITORY_MONITOR:-monitor}:${IMAGE_TAG:-latest}
        - ${ECR_REGISTRY:-registry}/${ECR_REPOSITORY_MONITOR:-monitor}:latest
        - knowledge_commons_profiles_monitor:${IMAGE_TAG:-latest}
        - knowledge_commons_profiles_monitor:latest
    image: knowledge_commons_profiles_monitor
    restart: unless-stopped
